<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0e0d0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="参戦帳">
<title>ベガルタ仙台 参戦帳</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:#0e0d0b;color:#e9e6df;-webkit-tap-highlight-color:transparent;
    font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",Georgia,serif;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .wrap{max-width:480px;margin:0 auto}
  .foil{background-image:linear-gradient(135deg,#fff2c0,#f3ce55 35%,#d7a01e 55%,#f0d066 80%,#c9a11a);
    -webkit-background-clip:text;background-clip:text;color:transparent}

  header.app{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#151310,#100e0c);border-bottom:1px solid #2a2620}
  .hd{padding:12px 16px 10px}
  .hdtop{display:flex;justify-content:space-between;align-items:flex-end}
  .titlewrap{display:flex;align-items:center;gap:10px}
  .crest{width:38px;height:38px;object-fit:contain;flex:0 0 auto;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}
  .crestsm{width:28px;height:28px}
  .eyebrow{font-size:10px;letter-spacing:.35em;color:#7a756c}
  .title{font-size:20px;font-weight:600;margin:2px 0 0;letter-spacing:.02em}
  .gowrap{text-align:right;line-height:1}
  .goN{font-size:30px;font-weight:700}
  .goL{font-size:9px;letter-spacing:.2em;color:#7a756c}
  .divider{height:1px;margin-top:8px;background:linear-gradient(90deg,transparent,#e0b94a55,transparent)}
  .counts{display:flex;gap:6px;margin-top:10px}
  .ccell{flex:1;background:#1b1813;border:1px solid #322c22;border-radius:6px;padding:4px 2px;text-align:center;font-weight:700}
  .ccell .foil{font-size:12px}
  .ccell b{display:block;font-size:14px}
  .ccell.none{background:#15161a;border-color:#262a30;color:#8a8a8a}
  .filters{display:flex;gap:6px;overflow-x:auto;padding:0 12px 8px}
  .fbtn{flex:0 0 auto;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600;background:#1b1813;color:#c9b897;border:1px solid #322c22;white-space:nowrap}
  .fbtn.on{background:linear-gradient(135deg,#f6d666,#cda11c);color:#1a1508;border-color:transparent}
  .fn{opacity:.6}

  .list{padding:10px 12px 96px}
  .empty{text-align:center;color:#6b665d;padding:40px 0;font-size:14px}

  .ticket{position:relative;border-radius:10px;margin-bottom:10px;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.14),0 6px 16px rgba(0,0,0,.5)}
  .pat{position:absolute;inset:0;border-radius:10px;pointer-events:none;z-index:0}
  .row{position:relative;display:flex;z-index:1}
  .stub{flex:0 0 62px;width:62px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px 4px}
  .stubcomp{font-size:10px;font-weight:700;letter-spacing:.02em;line-height:1}
  .stubno{font-size:24px;font-weight:700;line-height:1;margin-top:4px;text-shadow:0 1px 0 rgba(255,255,255,.4)}
  .stubsetsu{font-size:9px;font-weight:700;margin-top:2px;opacity:.7}
  .stubcup{font-size:14px;font-weight:700;line-height:1.15;margin-top:4px}
  .body{flex:1 1 auto;min-width:0;padding:8px 10px 8px 14px}
  .plate{border-radius:8px;padding:6px 10px}
  .prow{display:flex;align-items:center;gap:8px}
  .opp{flex:1;min-width:0;font-weight:700;font-size:15px;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .badge{flex:0 0 auto;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;letter-spacing:.03em;color:#fff}
  .meta{font-size:12px;font-weight:700;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .stgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
  .st{height:36px;border-radius:6px;font-weight:700;font-size:11px;padding:0 2px;line-height:1.2;letter-spacing:-0.02em}

  .memo{margin-top:8px;border-radius:8px;overflow:hidden}
  .tg{width:100%;display:flex;align-items:flex-start;gap:6px;font-size:12px;font-weight:600;padding:6px 10px;text-align:left}
  .chev{display:inline-block;transition:transform .15s;margin-top:1px;flex:0 0 auto}
  .msum{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
  .mline{display:flex;align-items:flex-start;gap:4px}
  .brk{overflow-wrap:break-word;word-break:break-word}
  .mpanel{padding:0 10px 10px}
  .lbl{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:4px}
  .opt{font-weight:400;opacity:.6}
  .chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
  .chip{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
  .inp{width:100%;border-radius:6px;padding:6px 8px;font-size:13px;outline:none;font-family:inherit}
  svg.ic{vertical-align:-2px}

  .perf{position:absolute;left:62px;top:2px;bottom:2px;width:1.5px;z-index:2;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,.42) 0 4px,transparent 4px 8px)}
  .hole{position:absolute;left:62px;width:5px;height:5px;border-radius:50%;background:#0e0d0b;transform:translateX(-50%);z-index:2}

  .foot{max-width:480px;margin:0 auto;padding:0 16px 32px;text-align:center}
  .foot p{font-size:10px;color:#6b665d;line-height:1.6}

  .fab{position:fixed;right:16px;bottom:20px;z-index:30;display:flex;align-items:center;justify-content:center;gap:8px;
    width:132px;padding:12px 0;border-radius:999px;font-weight:700;
    background:linear-gradient(135deg,#f6d666,#cda11c);color:#1a1508;box-shadow:0 6px 18px rgba(0,0,0,.55)}
  .fab2{position:fixed;right:16px;bottom:76px;z-index:30;display:flex;align-items:center;justify-content:center;gap:8px;
    width:132px;padding:12px 0;border-radius:999px;font-weight:700;
    background:linear-gradient(135deg,#f6d666,#cda11c);color:#1a1508;box-shadow:0 6px 18px rgba(0,0,0,.55)}

  .maplegend{display:flex;gap:14px;justify-content:center;padding:4px 0 14px;font-size:12px;color:#c9b897}
  .maplegend span{display:inline-flex;align-items:center;gap:5px}
  .swatch{width:11px;height:11px;border-radius:3px;display:inline-block}
  .mapcounts{display:flex;gap:8px;justify-content:center;padding:0 0 14px}
  .mapcount{background:#1b1813;border:1px solid #322c22;border-radius:8px;padding:6px 14px;text-align:center}
  .mapcount b{display:block;font-size:18px}
  .mapcount span{font-size:10px;color:#8a8378}
  .mapsvgwrap{width:100%;background:#12151c;border-radius:14px;border:1px solid #262c38;padding:8px 4px;overflow:hidden}
  .mapsvgwrap svg{width:100%;height:auto;display:block}
  .mapsvgwrap .prefecture{stroke:#0e0d0b;stroke-width:1.2;transition:opacity .15s}
  .mapsvgwrap .prefecture:active{opacity:.7}
  .mapsvgwrap .boundary-line line{stroke:#4a4f5a}
  .mapdetail{margin-top:14px;background:#17161a;border:1px solid #2a2820;border-radius:10px;padding:12px 14px;font-size:13px;min-height:20px}
  .mapdetail .mdname{font-weight:700;font-size:15px;margin-bottom:6px}
  .mapdetail .mditem{display:flex;justify-content:space-between;gap:8px;padding:4px 0;border-top:1px solid #232019;font-size:12px}
  .mapdetail .mditem:first-of-type{border-top:none}

  .modal{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.88);display:none;flex-direction:column}
  .modal.show{display:flex}
  .mhd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;flex:0 0 auto}
  .mtitle{font-size:14px;font-weight:700;color:#f0c64a}
  .msub{font-size:11px;color:#9a938a;max-width:60vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mclose{font-size:14px;color:#e6e6e6;padding:6px 12px;border-radius:999px;border:1px solid #444}
  .mbody{flex:1;overflow:auto;padding:0 16px 8px}
  .mimg{width:100%;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.6);display:block}
  .mhint{font-size:11px;color:#9a938a;text-align:center;margin-top:8px}
  .mfoot{padding:16px;flex:0 0 auto}
  .msave{width:100%;padding:12px;border-radius:12px;font-weight:700;background:linear-gradient(135deg,#f6d666,#cda11c);color:#1a1508}
</style>
</head>

// 旧形式ID（大会名-節-配列番号）を新形式（大会名-節）へ一度だけ移行。参戦記録の迷子を防ぐ
function migrateOldIds(){
  try{
    var oldMap = {};
    RAW.forEach(function(m,i){ oldMap[m.comp+"-"+m.round+"-"+i] = m.comp+"-"+m.round; });
    var raw = localStorage.getItem(KEY);
    if(!raw) return;
    var obj = JSON.parse(raw);
    var changed=false, next={};
    for(var k in obj){
      var nk = oldMap[k] || k;
      if(nk!==k) changed=true;
      var merged={}; var base=next[nk]||{}; for(var bk in base) merged[bk]=base[bk];
      var src=obj[k]||{}; for(var sk in src) merged[sk]=src[sk];
      next[nk]=merged;
    }
    if(changed){ localStorage.setItem(KEY, JSON.stringify(next)); }
  }catch(e){}
}

function setField(id, patch, doRender){
  var cur = {}; var src = rec[id]||{}; for(var k in src) cur[k]=src[k];

  save();
  if(doRender!==false) render();
}

/* ── 参戦マップ ── */
function computePrefStatus(){
  var map = {};
  MATCHES.forEach(function(m){
    var p = matchPref(m);
    if(!p) return;
    if(!map[p]) map[p] = {matches:[]};
    map[p].matches.push(m);
  });
  for(var p in map){
    var hasAtt=false, hasPlan=false;
    map[p].matches.forEach(function(m){
      var r = rec[m.id]||{};
      if(r.s==="◎") hasAtt=true;
      if(r.s==="○") hasPlan=true;
    });
    map[p].status = hasAtt ? "att" : (hasPlan ? "plan" : "none");
  }
  return map;
}

/* ── 画像出力（チケット意匠・2列・背景写真） ── */
function roundRectPath(ctx,x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function fitText(ctx,text,maxW){ if(ctx.measureText(text).width<=maxW) return text; var s=text; while(s.length>1 && ctx.measureText(s+"…").width>maxW) s=s.slice(0,-1); return s+"…"; }
// 文字を切らずに枠へ収める（幅に応じてフォントサイズを自動で縮小）
function fitFont(ctx,text,maxW,maxPx,minPx,weight,family){
  var size=maxPx; ctx.font=weight+" "+size+"px "+family;
  while(size>minPx && ctx.measureText(text).width>maxW){ size-=1; ctx.font=weight+" "+size+"px "+family; }
  return size;
}
// 文字の縁に薄いハロー（影）を足してから塗る（strokeTextより細部が潰れにくい）
function strokeFillText(ctx,text,x,y,fillColor,haloColor,r){
  ctx.fillStyle=haloColor;
  ctx.fillText(text,x-r,y); ctx.fillText(text,x+r,y);
  ctx.fillText(text,x,y-r); ctx.fillText(text,x,y+r);
  ctx.fillStyle=fillColor; ctx.fillText(text,x,y);
}
var _crestPromise=null;
function loadCrestImage(){
  if(_crestPromise) return _crestPromise;
  _crestPromise=new Promise(function(resolve){
    var img=new Image();
    img.onload=function(){ resolve(img); };
    img.onerror=function(){ resolve(null); };
    img.src=CREST_IMG;
  });
  return _crestPromise;
}
// エンブレムの配色（紺・金・赤）を使ったオリジナル背景を描く
function drawEmblemBackground(ctx,W,H){
  var bgGrad=ctx.createLinearGradient(0,0,W,H);
  bgGrad.addColorStop(0,"#0a1224"); bgGrad.addColorStop(0.5,"#111d3a"); bgGrad.addColorStop(1,"#080e1c");
  ctx.fillStyle=bgGrad; ctx.fillRect(0,0,W,H);

  // 斜めに走る金・赤のバンド（エンブレムの炎・羽根モチーフを抽象化）
  ctx.save();
  ctx.translate(W*0.5,H*0.5);
  ctx.rotate(-16*Math.PI/180);
  var bands=[
    {off:-H*0.9,w:H*0.5,color:"rgba(224,185,74,0.10)"},
    {off:-H*0.25,w:H*0.32,color:"rgba(196,44,44,0.09)"},
    {off:H*0.25,w:H*0.4,color:"rgba(224,185,74,0.08)"},
    {off:H*0.75,w:H*0.3,color:"rgba(196,44,44,0.07)"}
  ];
  bands.forEach(function(b){
    ctx.fillStyle=b.color;
    ctx.fillRect(-W*1.3, b.off, W*2.6, b.w);
  });
  ctx.restore();

  // 中央のビネット（暗く落として文字を引き立てる）
  var vg=ctx.createRadialGradient(W/2,H*0.42,Math.min(W,H)*0.15,W/2,H*0.42,Math.max(W,H)*0.78);
  vg.addColorStop(0,"rgba(0,0,0,0)"); vg.addColorStop(1,"rgba(0,0,0,0.55)");
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

function makeScheduleImage(list, filterLabel, going){
  var W=1080,P=28,G=16,headerH=110,footerH=54,STUBW=60,COLS=3;
  var GK='"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif';
  var MIN='"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif';
  var colW=(W-2*P-(COLS-1)*G)/COLS;
  var rows=Math.max(Math.ceil(list.length/COLS),1);
  var rowH=Math.max(78,Math.min(190,Math.floor(1650/Math.ceil(MATCHES.length/COLS))));
  var cardH=rowH-14;
  var H=headerH+rowH*rows+footerH;
  var plHcalc=cardH-16;

  return loadCrestImage().then(function(crest){
    var cv=document.createElement("canvas"); var scale=2;
    cv.width=W*scale; cv.height=H*scale;
    var ctx=cv.getContext("2d"); ctx.scale(scale,scale);

    // ── オリジナル背景（エンブレムカラー）＋大きく淡いエンブレムの透かし ──
    drawEmblemBackground(ctx,W,H);
    if(crest){
      var cw=H*0.62, chh=cw*(crest.height/crest.width);
      ctx.save(); ctx.globalAlpha=0.14;
      ctx.drawImage(crest, W-cw*0.68, H*0.5-chh*0.42, cw, chh);
      ctx.restore();
    }

    // ── ヘッダー（タイトル＋凡例を横並びに。右端にエンブレム） ──
    var rowY=54;
    ctx.textBaseline="middle";
    var foil=ctx.createLinearGradient(P,rowY-24,P+420,rowY+24);
    foil.addColorStop(0,"#fff2c0"); foil.addColorStop(.5,"#e7b93e"); foil.addColorStop(1,"#c9a11a");
    ctx.font="bold 34px "+MIN;
    strokeFillText(ctx,"ベガルタ仙台 参戦帳",P,rowY,foil,"rgba(0,0,0,0.75)",1.1);
    var titleW=ctx.measureText("ベガルタ仙台 参戦帳").width;

    if(crest){
      var ld=64, lh=ld*(crest.height/crest.width);
      ctx.drawImage(crest, W-P-ld, rowY-lh/2, ld, lh);
    }

    var leg=[["◎","参戦済み"],["○","参戦予定"],["△","検討中"],["×","非参戦"]];
    var lx=P+titleW+40;
    leg.forEach(function(it){ var d=24;
      roundRectPath(ctx,lx,rowY-d/2,d,d,6); ctx.fillStyle=STATUS_COLOR[it[0]]; ctx.fill();
      ctx.textAlign="left"; ctx.font="600 17px "+GK;
      strokeFillText(ctx,it[1],lx+d+6,rowY+1,"#e6ddc4","rgba(0,0,0,0.7)",0.7);
      lx+=d+6+ctx.measureText(it[1]).width+22;
    });
    ctx.textBaseline="alphabetic";
    ctx.strokeStyle="rgba(224,185,74,0.55)"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(P,headerH-14); ctx.lineTo(W-P,headerH-14); ctx.stroke();

    function metalGrad(x,y,w,h,home){ var g=ctx.createLinearGradient(x,y,x+w,y+h);
      if(home){ g.addColorStop(0,"#f3d271"); g.addColorStop(.4,"#e0b23a"); g.addColorStop(.62,"#c5951d"); g.addColorStop(.82,"#e6bd4e"); g.addColorStop(1,"#cfa127"); }
      else { g.addColorStop(0,"#eef1f5"); g.addColorStop(.42,"#d7dde5"); g.addColorStop(.64,"#bcc5d0"); g.addColorStop(.84,"#e4e8ee"); g.addColorStop(1,"#c8d0da"); }
      return g; }

    function card(m,s,x,y,w,h){
      var r=14,home=m.home,sx=x+STUBW,ink=home?"#2e2108":"#16283f",sub=home?"#4a380f":"#2c4060";
      ctx.save(); ctx.shadowColor="rgba(0,0,0,0.6)"; ctx.shadowBlur=18; ctx.shadowOffsetY=7;
      roundRectPath(ctx,x,y,w,h,r); ctx.fillStyle=metalGrad(x,y,w,h,home); ctx.fill(); ctx.restore();
      ctx.save(); roundRectPath(ctx,x,y,w,h,r); ctx.clip();
      var sh=ctx.createLinearGradient(x,y,x+w*.5,y+h*.5); sh.addColorStop(0,"rgba(255,255,255,"+(home?.26:.4)+")"); sh.addColorStop(1,"rgba(255,255,255,0)"); ctx.fillStyle=sh; ctx.fillRect(x,y,w,h);
      ctx.lineWidth=3;
      if(home){ ctx.strokeStyle="rgba(0,0,0,0.11)"; for(var xx=x+6; xx<x+w; xx+=13){ ctx.beginPath(); ctx.moveTo(xx,y); ctx.lineTo(xx,y+h); ctx.stroke(); } }
      else { ctx.strokeStyle="rgba(20,45,90,0.13)"; for(var off=-h; off<w; off+=14){ ctx.beginPath(); ctx.moveTo(x+off,y); ctx.lineTo(x+off+h,y+h); ctx.stroke(); } }
      ctx.restore();
      // 縁（外側の濃い線＋内側の淡い箔ライン）
      roundRectPath(ctx,x,y,w,h,r); ctx.strokeStyle="rgba(0,0,0,0.2)"; ctx.lineWidth=1.5; ctx.stroke();
      roundRectPath(ctx,x+1.6,y+1.6,w-3.2,h-3.2,r-1.5); ctx.strokeStyle="rgba(255,255,255,0.35)"; ctx.lineWidth=1; ctx.stroke();

      // スタブ：上段＝J2は節番号のみ／天皇杯・ルヴァンは大会名のみ、下段＝参戦ステータス
      ctx.fillStyle=ink; ctx.textAlign="center";
      if(m.comp==="J2"){
        var roundMaxPx=Math.min(h*0.22,20);
        var roundSize=fitFont(ctx,m.round,STUBW-10,roundMaxPx,14,"bold",MIN);
        var numCY=y+h*0.17;
        ctx.textBaseline="middle"; ctx.fillText(m.round,x+STUBW/2,numCY);
        ctx.font="bold 11px "+MIN; ctx.textBaseline="alphabetic";
        ctx.fillText("節",x+STUBW/2,numCY+roundSize*0.65+10);
      } else {
        var compMaxPx=Math.min(h*0.16,16);
        fitFont(ctx,m.comp,STUBW-8,compMaxPx,9,"bold",MIN);
        ctx.textBaseline="middle"; ctx.fillText(m.comp,x+STUBW/2,y+h*0.26);
      }
      ctx.textAlign="left"; ctx.textBaseline="alphabetic";

      // 参戦ステータス（スタブ下段のバッジ）
      var sd=Math.min(STUBW-18,h*0.34,38), scx=x+STUBW/2, scy=y+h*0.72;
      if(s){
        roundRectPath(ctx,scx-sd/2,scy-sd/2,sd,sd,sd/4); ctx.fillStyle=STATUS_COLOR[s]; ctx.fill();
        ctx.fillStyle="#fff"; ctx.font="bold "+(sd*0.62)+"px "+GK; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText(STATUS_GLYPH[s],scx,scy+1); ctx.textAlign="left"; ctx.textBaseline="alphabetic";
      } else {
        ctx.strokeStyle="rgba(0,0,0,0.28)"; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(scx-sd*.24,scy); ctx.lineTo(scx+sd*.24,scy); ctx.stroke();
      }

      ctx.save(); ctx.setLineDash([5,4]); ctx.strokeStyle="rgba(0,0,0,0.4)"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(sx,y+6); ctx.lineTo(sx,y+h-6); ctx.stroke(); ctx.restore();
      ctx.fillStyle="#0e0d0b";
      ctx.beginPath(); ctx.arc(sx,y,5,0,7); ctx.fill();
      ctx.beginPath(); ctx.arc(sx,y+h,5,0,7); ctx.fill();

      var plX=sx+10, plY=y+8, plW=x+w-10-plX, plH=h-16;
      roundRectPath(ctx,plX,plY,plW,plH,8); ctx.fillStyle=home?"#f6e6b8":"#eef1f6"; ctx.fill();
      ctx.strokeStyle="rgba(0,0,0,0.14)"; ctx.lineWidth=1; ctx.stroke();
      var padL=plX+12, l1=plY+plH*0.20, l2=plY+plH*0.52, l3=plY+plH*0.82, lineMaxW=plW-24;

      // 文字は省略せず、収まるようフォントサイズを自動調整（全文表示を保証）。プレートで十分視認性が出るため縁取りなし
      ctx.fillStyle=ink; ctx.textBaseline="middle";
      fitFont(ctx,m.opp,lineMaxW,Math.min(plH*0.28,22),11,"bold",MIN);
      ctx.fillText(m.opp,padL,l1);
      ctx.fillStyle=sub;
      var dt=m.date+"（"+m.dow+"）"+(m.ko!=="未定"?" "+m.ko:"");
      fitFont(ctx,dt,lineMaxW,Math.min(plH*0.20,17),9,"600",MIN);
      ctx.fillText(dt,padL,l2);
      fitFont(ctx,m.venue,lineMaxW,Math.min(plH*0.20,17),9,"600",MIN);
      ctx.fillText(m.venue,padL,l3);
      ctx.textBaseline="alphabetic";
    }

    // ── チケット幅：全試合中もっとも長い対戦相手名／日時／会場が収まる最小幅に統一（フィルターに関わらず一定）──
    var oppFontPx=Math.min(plHcalc*0.28,22);
    ctx.font="bold "+oppFontPx+"px "+MIN;
    var maxOppW=0; MATCHES.forEach(function(m){ var wtx=ctx.measureText(m.opp).width; if(wtx>maxOppW) maxOppW=wtx; });
    var lineFontPx=Math.min(plHcalc*0.20,17);
    ctx.font="600 "+lineFontPx+"px "+MIN;
    var maxLineW=0; MATCHES.forEach(function(m){
      var dt=m.date+"（"+m.dow+"）"+(m.ko!=="未定"?" "+m.ko:"");
      var wtx1=ctx.measureText(dt).width; if(wtx1>maxLineW) maxLineW=wtx1;
      var wtx2=ctx.measureText(m.venue).width; if(wtx2>maxLineW) maxLineW=wtx2;
    });
    var contentW=Math.max(maxOppW, maxLineW);
    var STUBW_DEFAULT=STUBW, STUBW_MIN=36;
    var idealWFull=Math.ceil(contentW+24+6+STUBW_DEFAULT+20);
    var ticketW, blockW, xStart, colXs;
    if(idealWFull<=colW){
      ticketW=Math.max(STUBW_DEFAULT+120, idealWFull);
    } else {
      // 列幅に収まらない場合は、テキストを削らずスタブを縮めて幅を確保
      ticketW=colW;
      STUBW=Math.max(STUBW_MIN, Math.min(STUBW_DEFAULT, Math.floor(colW-44-contentW)));
    }
    blockW=ticketW*COLS+G*(COLS-1);
    xStart=P+Math.max(0,(W-2*P-blockW))/2;
    colXs=[]; for(var ci=0; ci<COLS; ci++) colXs.push(xStart+ci*(ticketW+G));

    // 列ごとに試合数を均等配分（余りは前の列から）。各列は上から下へ、列は左から右へ
    var base=Math.floor(list.length/COLS), extra=list.length%COLS;
    var lens=[]; for(var li=0; li<COLS; li++) lens.push(base+(li<extra?1:0));
    var idx=0;
    for(var col=0; col<COLS; col++){
      for(var row=0; row<lens[col]; row++){
        if(idx>=list.length) break;
        var m=list[idx]; idx++;
        var x=colXs[col], y=headerH+row*rowH+7;
        card(m,(rec[m.id]||{}).s,x,y,ticketW,cardH);
      }
    }

    ctx.font="400 22px "+GK;
    strokeFillText(ctx,"日程・会場は変更の場合あり · vegalta.co.jp",P,H-24,"#cfc7b4","rgba(0,0,0,0.65)",0.7);

    // ── 額縁 ──
    ctx.strokeStyle="rgba(224,185,74,0.55)"; ctx.lineWidth=2; ctx.strokeRect(9,9,W-18,H-18);
    ctx.strokeStyle="rgba(224,185,74,0.2)"; ctx.lineWidth=1; ctx.strokeRect(15,15,W-30,H-30);

    return cv.toDataURL("image/png");
  });
}

function downloadDataUrl(dataUrl, filename){
  fetch(dataUrl).then(function(res){ return res.blob(); }).then(function(blob){
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename; a.rel="noopener";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
  }).catch(function(){
    // フォールバック：従来方式
    var a=document.createElement("a"); a.href=dataUrl; a.download=filename; document.body.appendChild(a); a.click(); a.remove();
  });
}

/* ── 参戦マップの画像化 ── */
function svgToImage(svgEl){
  return new Promise(function(resolve){
    var svgStr = new XMLSerializer().serializeToString(svgEl);
    var blob = new Blob([svgStr], {type:"image/svg+xml;charset=utf-8"});
    var url = URL.createObjectURL(blob);
    var img = new Image();
    img.onload = function(){ URL.revokeObjectURL(url); resolve(img); };
    img.onerror = function(){ URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}
async function makeMapImage(){
  var pstatus = computePrefStatus();
  var attCount=0, planCount=0;
  ALL_PREF_NAMES.forEach(function(n){ var s=pstatus[n]; if(s){ if(s.status==="att") attCount++; else if(s.status==="plan") planCount++; } });

  var svgEl = document.querySelector("#mapSvgWrap svg");
  var mapImg = await svgToImage(svgEl);

  var W=900, P=28, headerH=140, mapSize=W-2*P, footerH=44;
  var H = headerH+mapSize+footerH;
  var GK='"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif';
  var MIN='"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif';

  var cv=document.createElement("canvas"); var scale=2;
  cv.width=W*scale; cv.height=H*scale;
  var ctx=cv.getContext("2d"); ctx.scale(scale,scale);
  ctx.fillStyle="#0e0d0b"; ctx.fillRect(0,0,W,H);

  var foil=ctx.createLinearGradient(P,20,P+320,60);
  foil.addColorStop(0,"#fff2c0"); foil.addColorStop(.5,"#e7b93e"); foil.addColorStop(1,"#c9a11a");
  ctx.fillStyle=foil; ctx.font="bold 34px "+MIN;
  ctx.fillText("ベガルタ仙台 参戦マップ",P,56);

  var leg=[["#16a34a","参戦実績あり"],["#cda11c","参戦予定あり"],["#3a3f4a","まだ無し"]];
  var lx=P, ly=90;
  leg.forEach(function(it){ var d=16;
    roundRectPath(ctx,lx,ly-d/2,d,d,4); ctx.fillStyle=it[0]; ctx.fill();
    ctx.fillStyle="#c9b897"; ctx.font="600 15px "+GK; ctx.textAlign="left"; ctx.textBaseline="middle";
    ctx.fillText(it[1],lx+d+6,ly+1);
    lx+=d+6+ctx.measureText(it[1]).width+20;
  });
  ctx.fillStyle="#e6ddc4"; ctx.font="700 16px "+GK; ctx.textAlign="right"; ctx.textBaseline="middle";
  ctx.fillText("実績 "+attCount+"県 ／ 予定 "+planCount+"県",W-P,ly+1);
  ctx.textAlign="left";

  ctx.strokeStyle="rgba(224,185,74,0.5)"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(P,headerH-10); ctx.lineTo(W-P,headerH-10); ctx.stroke();

  roundRectPath(ctx,P,headerH,mapSize,mapSize,14); ctx.fillStyle="#12151c"; ctx.fill();
  ctx.save(); roundRectPath(ctx,P,headerH,mapSize,mapSize,14); ctx.clip();
  if(mapImg) ctx.drawImage(mapImg,P,headerH,mapSize,mapSize);
  ctx.restore();
  ctx.strokeStyle="rgba(224,185,74,0.35)"; ctx.lineWidth=1.5;
  roundRectPath(ctx,P,headerH,mapSize,mapSize,14); ctx.stroke();

  ctx.fillStyle="#6b665d"; ctx.font="400 16px "+GK;
  ctx.fillText("2026/27 明治安田J2 · vegalta.co.jp",P,H-18);

  return cv.toDataURL("image/png");
}
